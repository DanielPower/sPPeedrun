# Example production stack. Provide the osu! OAuth credentials via `.env`, then:
#   docker compose up -d

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: sppeedrun
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sppeedrun"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/danielpower/sppeedrun:latest
    restart: "no"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/sppeedrun
    depends_on:
      db:
        condition: service_healthy
    command: ["pnpm", "db:migrate"]

  web:
    image: ghcr.io/danielpower/sppeedrun:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      OSU_CLIENT_ID: ${OSU_CLIENT_ID}
      OSU_CLIENT_SECRET: ${OSU_CLIENT_SECRET}
      OSU_AUTH_CALLBACK_URL: ${OSU_AUTH_CALLBACK_URL}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/sppeedrun
      ORIGIN: ${ORIGIN:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  worker:
    image: ghcr.io/danielpower/sppeedrun:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      OSU_CLIENT_ID: ${OSU_CLIENT_ID}
      OSU_CLIENT_SECRET: ${OSU_CLIENT_SECRET}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/sppeedrun
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["node", "--import", "tsx", "src/worker/index.ts"]

volumes:
  pgdata:
